<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FF5722; 
            font-family: "Gill Sans", "Gill Sans MT", Calibri, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .page-title {
            text-align: center;
            margin-top: 50px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .calculator-box {
            background-color: #3498db; 
            padding: 40px;
            border-radius: 25px;
            border: 2px solid white;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            width: 450px;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            font-weight: bold;
            font-size: 1.2rem;
            margin-right: 10px;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: none;
            width: 200px;
            font-size: 1rem;
            font-family: inherit;
        }

        .btn-compute {
            background-color: white;
            color: #266bd2;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-compute:hover {
            background-color: #163348;
            color: white;
        }
    </style>
</head>
<body>

    <h1 class="page-title">Electricity Consumption Classifier</h1>

    <div class="main-container">
        <div class="calculator-box">
            <p>Input your total kilowatt-hour (kWh) usage to determine your consumer category and rates.</p>
            
            <div class="input-group">
                <label for="grd1">kWh:</label>
                <input type="number" id="grd1" placeholder="Enter amount">
            </div>

            <button onclick="calculate()" class="btn-compute">COMPUTE</button>
        </div>
    </div>

    <script>
        function calculate() {
            let kwh = parseFloat(document.getElementById('grd1').value);

            if (isNaN(kwh) || kwh < 0) {
                window.alert("Error: Please enter a valid non-negative number.");
                return;
            }

            let category = "";
            let description = "";

            if (kwh <= 100) {
                category = "Lifeline Consumer";
                description = "Discounted electricity rates";
            } else if (kwh <= 200) {
                category = "Low Consumption";
                description = "Normal residential rate";
            } else if (kwh <= 300) {
                category = "Average Consumption";
                description = "Typical electricity usage";
            } else if (kwh <= 500) {
                category = "High Consumption";
                description = "Higher electricity usage";
            } else {
                category = "Very High Consumption";
                description = "Heavy electricity users";
            }

            window.alert("KWH USAGE: " + kwh + "\nCATEGORY: " + category + "\nSTATUS: " + description);
        }
    </script>

</body>
</html>
